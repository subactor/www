<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subactor — smoke landing</title>
  <style>
    :root { color-scheme: light; --ink:#1a1a1a; --accent:#0b6e4f; --bg:#f7f5f0; }
    body { margin:0; font-family: Georgia, "Times New Roman", serif; background: linear-gradient(160deg,#f7f5f0,#e8efe9); color:var(--ink); min-height:100vh; display:grid; place-items:center; }
    main { max-width:36rem; padding:2.5rem 1.5rem; text-align:center; }
    h1 { font-size: clamp(2.2rem, 6vw, 3.2rem); letter-spacing:-0.02em; margin:0 0 .75rem; color:var(--accent); }
    p { font-size:1.15rem; line-height:1.5; margin:0 0 1.5rem; opacity:.9; }
    a { color:var(--accent); font-weight:600; }
  </style>
</head>
<body>
  <main>
    <h1>Subactor</h1>
    <p>Minimalna strona smoke — test publikacji / dry-run sync do httpdocs.</p>
    <p><a href="https://subactor.com">subactor.com</a></p>
  </main>
</body>
</html>
